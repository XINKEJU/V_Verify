<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://beacon.cdn.qq.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self' data: https://*.alicdn.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co; base-uri 'self'; object-src 'none'; form-action 'self'">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <title>管理后台 · 校园网服务</title>
  <link rel="stylesheet" href="./vendor/vant.min.css">
  <script src="./vendor/vue.global.prod.js"></script>
  <script src="./vendor/vant.min.js"></script>
  <script src="./vendor/supabase.min.js"></script>
  <script src="./src/config.js"></script>
  <style>
    :root{
      --red:#E60012;--red-d:#C1000E;--red-soft:#FDECEE;
      --bg:#F3F4F6;--card:#fff;--text:#1A1A1A;--muted:#8A9099;--line:#EEF0F3;--r:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',Arial,sans-serif;
      -webkit-font-smoothing:antialiased;min-height:100vh}
    .app{max-width:480px;margin:0 auto;background:var(--bg);min-height:100vh;padding-bottom:8px}

    .topbar{background:var(--red);color:#fff;padding:20px 18px 16px;position:relative}
    .brand{display:flex;align-items:center;gap:11px}
    .logo{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.18);
      display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;letter-spacing:-1px}
    .brand-name{font-size:18px;font-weight:700;letter-spacing:.5px}
    .brand-sub{font-size:12px;opacity:.88;margin-top:2px}
    .topbar .links{position:absolute;top:16px;right:14px;display:flex;gap:8px}
    .top-link{font-size:12px;color:#fff;background:rgba(255,255,255,.16);padding:5px 12px;border-radius:20px;cursor:pointer}

    .card{margin:12px;background:var(--card);border-radius:var(--r);box-shadow:0 1px 3px rgba(20,20,40,.05);overflow:hidden}
    .chead{padding:14px 16px 10px;display:flex;align-items:center;gap:8px}
    .chead .bar{width:3px;height:15px;background:var(--red);border-radius:2px}
    .chead h3{margin:0;font-size:15px;font-weight:700}

    .tabs{display:flex;background:#fff;border-bottom:1px solid var(--line)}
    .tab{flex:1;text-align:center;padding:14px 0;font-size:14px;color:var(--muted);cursor:pointer;position:relative}
    .tab.active{color:var(--red);font-weight:700}
    .tab.active::after{content:'';position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:36px;height:3px;background:var(--red);border-radius:2px}

    .field{display:flex;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid var(--line);min-height:52px}
    .field:last-child{border-bottom:none}
    .field label{width:78px;flex-shrink:0;font-size:14px;color:#555}
    .field input,.field select{flex:1;border:none;outline:none;font-size:14px;color:var(--text);background:transparent;padding:0}
    .field textarea{flex:1;border:none;outline:none;font-size:14px;background:transparent;resize:none;min-height:64px;padding-top:2px;font-family:inherit}
    .picker{color:var(--red);font-size:14px;cursor:pointer}

    .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
    .sitem{border:1.5px solid var(--line);border-radius:12px;padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;background:#fff;transition:.2s}
    .sico{width:42px;height:42px;border-radius:12px;background:var(--red-soft);color:var(--red);display:flex;align-items:center;justify-content:center}
    .sico svg{width:22px;height:22px}
    .slabel{font-size:12.5px;color:#333;text-align:center;line-height:1.3}
    .sitem.sel{border-color:var(--red);background:#FFF6F7}
    .sitem.sel .slabel{color:var(--red);font-weight:600}

    .ugrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}
    .ulabel{font-size:13px;color:#555;margin-bottom:8px;font-weight:500}
    .uarea{height:140px;border:1.5px dashed #d7dadf;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fafbfc;cursor:pointer;overflow:hidden;position:relative}
    .uarea.has{border-color:#1F9D55;border-style:solid;background:#f3fbf6}
    .uarea img{width:100%;height:100%;object-fit:cover}
    .uplace{text-align:center;color:var(--muted)}
    .uplace .ic{font-size:26px;margin-bottom:5px}

    .bar{display:flex;gap:10px;padding:14px 12px 26px}
    .bar button{flex:1}

    /* 登录 */
    .login-card{margin:14px 12px}
    .login-tip{font-size:12px;color:var(--muted);padding:0 16px 14px;line-height:1.6}

    /* 看板 */
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:12px}
    .kpi{background:#fff;border-radius:14px;padding:14px 6px;text-align:center;box-shadow:0 1px 3px rgba(20,20,40,.05)}
    .kpi .n{font-size:21px;font-weight:800;line-height:1.1}
    .kpi .l{font-size:11.5px;color:var(--muted);margin-top:5px}

    .chart-row{display:flex;align-items:center;gap:10px}
    .donut{flex:0 0 120px;width:120px}
    .legend{flex:1;display:flex;flex-direction:column;gap:7px}
    .lg{display:flex;align-items:center;font-size:13px}
    .lg .dot{width:9px;height:9px;border-radius:50%;margin-right:8px;flex-shrink:0}
    .lg .nm{color:#555;flex:1}
    .lg .ct{color:#333;font-weight:600}
    .lg .pc{color:var(--muted);font-size:11px;margin-left:6px}

    .bars{padding:4px 16px 14px}
    .empty-chart{padding:24px;text-align:center;color:#b5bac1;font-size:13px}

    /* 工单管理 */
    .filters{padding:6px 0}
    .ticket{margin:12px;background:#fff;border-radius:var(--r);box-shadow:0 1px 3px rgba(20,20,40,.05);overflow:hidden}
    .thead{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;cursor:pointer}
    .tno{font-size:14px;font-weight:700;letter-spacing:.5px;color:var(--red)}
    .tmeta{font-size:12px;color:var(--muted);margin-top:4px}
    .badge{font-size:12px;padding:3px 10px;border-radius:12px;color:#fff;white-space:nowrap}
    .tbody{padding:0 15px 14px;border-top:1px solid var(--line)}
    .kv{display:flex;padding:7px 0;font-size:13px;border-bottom:1px dashed var(--line)}
    .kv:last-child{border-bottom:none}
    .kv .k{width:70px;color:var(--muted);flex-shrink:0}
    .kv .v{color:#333;word-break:break-all;flex:1}
    .idimgs{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
    .idimgs img{width:104px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
    .dwrap{position:relative;display:inline-block}
    .dwrap img{width:104px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
    .dl{position:absolute;right:4px;bottom:4px;background:rgba(0,0,0,.55);color:#fff;
      font-size:11px;padding:2px 8px;border-radius:10px;text-decoration:none;line-height:1.5}
    .note-in{padding:0 15px 10px}
    .note-in input{width:100%;border:1px solid #e3e6ea;border-radius:8px;padding:8px 10px;font-size:13px;outline:none;box-sizing:border-box}
    .update{display:flex;gap:10px;margin-top:12px;align-items:center}
    .update select{flex:1;padding:8px 10px;border:1px solid #e3e6ea;border-radius:8px;font-size:14px;background:#fff}
    .empty{text-align:center;color:var(--muted);padding:52px 20px;font-size:14px}

    .van-cell-group{border-radius:0!important}
    :root{--van-primary-color:var(--red);--van-button-primary-background:var(--red);--van-button-primary-border-color:var(--red)}
    .van-field__label{color:#555}

    /* ── 响应式：桌面端自适应 ── */
    .dash-grid{display:grid;grid-template-columns:1fr;gap:0}
    .tickets{display:grid;grid-template-columns:1fr;gap:0}
    .tickets .ticket{margin:0}
    @media (min-width:768px){
      .app{max-width:860px}
      .kpis{grid-template-columns:repeat(6,1fr)}
      .dash-grid{grid-template-columns:1fr 1fr}
      .tickets{grid-template-columns:1fr 1fr}
      .sgrid{grid-template-columns:repeat(3,1fr)}
    }
    @media (min-width:1100px){
      .app{max-width:1060px}
      .tickets{grid-template-columns:1fr 1fr 1fr}
    }
  </style>
</head>
<body>
<div id="app" class="app">
  <!-- 登录 -->
  <div v-if="!loggedIn" class="topbar">
    <div class="brand">
      <div class="logo">沃</div>
      <div>
        <div class="brand-name">管理后台</div>
        <div class="brand-sub">浙江海洋大学 · 中国联通</div>
      </div>
    </div>
  </div>
  <div v-if="!loggedIn" class="card login-card">
    <div class="chead"><i class="bar"></i><h3>管理员登录</h3></div>
    <van-cell-group>
      <van-field v-model="loginPass" type="password" label="口令" placeholder="请输入管理员口令" @keyup.enter="doLogin"></van-field>
    </van-cell-group>
    <p v-if="loginErr" style="color:#E60012;font-size:13px;padding:0 16px 8px;margin:0">{{ loginErr }}</p>
    <div class="bar">
      <van-button block type="primary" :loading="loginLoading" @click="doLogin">登录</van-button>
    </div>
    <p class="login-tip">口令以哈希形式存于数据库，前端不接触明文。如遗忘口令，请在 Supabase Studio 重置 <code>site_config.admin_pass_hash</code>。</p>
  </div>

  <!-- 主界面 -->
  <template v-else>
    <div class="topbar">
      <div class="brand">
        <div class="logo">沃</div>
        <div>
          <div class="brand-name">管理后台</div>
          <div class="brand-sub">浙江海洋大学 · 中国联通</div>
        </div>
      </div>
      <div class="links">
        <span class="top-link" @click="goUser">用户端</span>
        <span class="top-link" @click="doLogout">退出</span>
      </div>
    </div>

    <div class="tabs">
      <div class="tab" :class="{active:activeTab==='manage'}" @click="switchTab('manage')">工单管理</div>
      <div class="tab" :class="{active:activeTab==='dashboard'}" @click="switchTab('dashboard')">数据看板</div>
    </div>

    <!-- ════ 数据看板 ════ -->
    <div v-show="activeTab==='dashboard'">
      <div v-if="!stats" class="empty">{{ statsErr || '加载统计中…' }}</div>
      <template v-else>
        <div class="kpis">
          <div class="kpi" v-for="k in kpis" :key="k.l">
            <div class="n" :style="{color:k.c}">{{ k.n }}</div>
            <div class="l">{{ k.l }}</div>
          </div>
        </div>

        <div class="dash-grid">
        <div class="card">
          <div class="chead"><i class="bar"></i><h3>状态分布</h3></div>
          <div style="padding:6px 16px 16px">
            <div class="chart-row">
              <div class="donut" v-html="donutSvg(stats.by_status)"></div>
              <div class="legend">
                <div class="lg" v-for="s in STATUS_ORDER" :key="s">
                  <span class="dot" :style="{background: statusColor(s)}"></span>
                  <span class="nm">{{ statusLabel(s) }}</span>
                  <span class="ct">{{ stats.by_status[s] || 0 }}</span>
                  <span class="pc">{{ pct(stats.by_status[s]||0, stats.total) }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="chead"><i class="bar"></i><h3>各服务类型工单量</h3></div>
          <div class="bars" v-html="barsSvg(stats.by_service)"></div>
        </div>
        </div>

        <div class="card">
          <div class="chead"><i class="bar"></i><h3>近 7 日提交趋势</h3></div>
          <div style="padding:10px 14px 16px" v-html="trendSvg(stats.trend)"></div>
        </div>
      </template>
    </div>

    <!-- ════ 工单管理 ════ -->
    <div v-show="activeTab==='manage'">
      <div class="card">
        <div class="chead"><i class="bar"></i><h3>筛选工单</h3></div>
        <div class="filters">
          <div class="field"><label>手机号</label><input v-model="filters.phone" placeholder="选填"></div>
          <div class="field"><label>工单号</label><input v-model="filters.ticket_no" placeholder="选填"></div>
          <div class="field"><label>状态</label>
            <select v-model="filters.status">
              <option value="">全部</option>
              <option v-for="s in STATUS_LIST" :key="s.value" :value="s.value">{{ s.label }}</option>
            </select>
          </div>
          <div class="field"><label>服务类型</label>
            <select v-model="filters.service">
              <option value="">全部</option>
              <option v-for="s in ADMIN_SERVICE_TYPES" :key="s.value" :value="s.value">{{ s.label }}</option>
            </select>
          </div>
        </div>
        <div class="bar" style="padding-top:6px">
          <van-button block type="primary" :loading="loading" @click="doSearch">查询</van-button>
        </div>
      </div>

      <div v-if="tickets.length===0 && queried" class="empty">未查询到工单</div>
      <div v-if="!queried" class="empty">请输入筛选条件后点击查询</div>

      <div class="tickets">
      <div v-for="t in tickets" :key="t.ticket_no" class="ticket">
        <div class="thead" @click="toggle(t)">
          <div>
            <div class="tno">{{ t.ticket_no }}</div>
            <div class="tmeta">{{ serviceLabel(t.service_type) }} · {{ t.phone }} · {{ formatDate(t.created_at) }}</div>
          </div>
          <span class="badge" :style="{background:statusInfo(t.status).color}">{{ statusInfo(t.status).label }}</span>
        </div>
        <div v-if="expanded===t.ticket_no" class="tbody">
          <div class="kv"><span class="k">姓名</span><span class="v">{{ t.name || '—' }}</span></div>
          <div class="kv"><span class="k">身份证</span><span class="v">{{ t.id_card || '—' }}</span></div>
          <div class="kv"><span class="k">学号</span><span class="v">{{ t.student_no || '—' }}</span></div>
          <div class="kv"><span class="k">套餐</span><span class="v">{{ PACKAGE_MAP[t.package] || '—' }}</span></div>
          <div class="kv"><span class="k">描述</span><span class="v">{{ t.description || '—' }}</span></div>
          <div class="kv"><span class="k">邮箱</span><span class="v">{{ t.email || '—' }}</span></div>
          <div class="kv"><span class="k">创建时间</span><span class="v">{{ formatDate(t.created_at) }}</span></div>
          <div class="kv" v-if="t.completed_at"><span class="k">完成时间</span><span class="v">{{ formatDate(t.completed_at) }}</span></div>
          <div class="idimgs" v-if="detailUrls[t.ticket_no] && (detailUrls[t.ticket_no].front || detailUrls[t.ticket_no].back)">
            <div class="dwrap" v-if="detailUrls[t.ticket_no].front">
              <img :src="detailUrls[t.ticket_no].front" @click="preview(detailUrls[t.ticket_no].front)">
              <a class="dl" @click.prevent="dlImg(detailUrls[t.ticket_no].front, t.ticket_no + '-人像面.jpg')">下载</a>
            </div>
            <div class="dwrap" v-if="detailUrls[t.ticket_no].back">
              <img :src="detailUrls[t.ticket_no].back" @click="preview(detailUrls[t.ticket_no].back)">
              <a class="dl" @click.prevent="dlImg(detailUrls[t.ticket_no].back, t.ticket_no + '-国徽面.jpg')">下载</a>
            </div>
          </div>
          <div class="kv" v-if="detailUrls[t.ticket_no] && detailUrls[t.ticket_no].desc && detailUrls[t.ticket_no].desc.length">
            <span class="k">描述截图</span>
            <span class="v">
              <span class="idimgs" style="margin-top:0">
                <span class="dwrap" v-for="(u,i) in detailUrls[t.ticket_no].desc" :key="i">
                  <img :src="u" @click="preview(u)">
                  <a class="dl" @click.prevent="dlImg(u, t.ticket_no + '-截图' + (i+1) + '.jpg')">下载</a>
                </span>
              </span>
            </span>
          </div>
          <div class="note-in">
            <input v-model="t._note" placeholder="处理备注（可选，将记入操作日志）">
          </div>
          <div class="update">
            <select v-model="t._newStatus">
              <option v-for="s in STATUS_LIST" :key="s.value" :value="s.value">{{ s.label }}</option>
            </select>
            <van-button size="small" type="primary" @click="updateStatus(t)">更新</van-button>
          </div>
        </div>
      </div>

      </div>
      <div v-if="tickets.length>0" style="padding:4px 12px 8px;text-align:center;font-size:12px;color:var(--muted)">已加载 {{ tickets.length }} 条</div>
      <div v-if="hasMore" style="padding:0 12px 24px">
        <van-button block plain round :loading="loading" @click="loadMore">加载更多</van-button>
      </div>
    </div>
  </template>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;

const ICONS = {
  package_change:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5v8l9 5 9-5V8z"/><path d="M3 8l9 5 9-5M12 13v8"/></svg>',
  broadband_open:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5a10 10 0 0115 0"/><path d="M7.5 15.5a5.5 5.5 0 019 0"/><circle cx="12" cy="19" r="1.1" fill="currentColor" stroke="none"/></svg>',
  broadband_close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M9 16.2a5.5 5.5 0 015.4-.2"/><path d="M4.5 12.5a10 10 0 014.4-2.9M19.5 12.5a10 10 0 00-4.8-3"/><circle cx="12" cy="19" r="1.1" fill="currentColor" stroke="none"/></svg>',
  query_account:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="4.5"/><path d="M10.5 12.5L21 2M16 7l3 3M19 4l2 2"/></svg>',
  trouble_report:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 01-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 005.4-5.4l-2.6 2.6-2.1-2.1 2.7-2.5z"/></svg>',
  cancel_account:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M17 11l4 4M21 11l-4 4"/></svg>',
};
const PACKAGE_MAP = {
  basic: '基础套餐 20元/月', standard: '标准套餐 40元/月',
  premium: '高级套餐 60元/月', addon: '叠加流量包 10元/10GB',
};
const ID_REQUIRED_TYPES = APP_CONFIG.ID_REQUIRED_TYPES || ['package_change', 'broadband_open', 'broadband_close', 'cancel_account'];
const STATUS_ORDER = ['pending', 'processing', 'dispatched', 'completed', 'closed'];

createApp({
  setup() {
    const SUPABASE_URL = APP_CONFIG.SUPABASE_URL;
    const SUPABASE_ANON_KEY = APP_CONFIG.SUPABASE_ANON_KEY;
    const getSb = () => supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const token = ref(sessionStorage.getItem('admin_token') || '');
    const loggedIn = computed(() => !!token.value);
    const loginPass = ref('');
    const loginErr = ref('');
    const loginLoading = ref(false);

    const activeTab = ref('manage');
    const ADMIN_SERVICE_TYPES = APP_CONFIG.ADMIN_SERVICE_TYPES;

    // ── 工单管理 ──
    const filters = reactive({ phone: '', ticket_no: '', status: '', service: '' });
    const STATUS_LIST = Object.entries(APP_CONFIG.STATUS_MAP).map(([value, v]) => ({ value, label: v.label }));
    const tickets = ref([]);
    const queried = ref(false);
    const loading = ref(false);
    const expanded = ref(null);
    const detailUrls = reactive({});
    const PAGE_SIZE = 50;
    const offset = ref(0);
    const hasMore = ref(false);

    // ── 看板统计 ──
    const stats = ref(null);
    const statsErr = ref('');
    const switchTab = (tab) => {
      activeTab.value = tab;
      if (tab === 'dashboard' && !stats.value) loadStats();
    };
    const loadStats = async () => {
      statsErr.value = '';
      try {
        const sb = getSb();
        const { data, error } = await sb.rpc('get_dashboard_stats');
        if (error) throw error;
        stats.value = data || {};
      } catch (e) {
        statsErr.value = '统计加载失败，请稍后重试';
        console.warn('loadStats 失败:', e);
      }
    };
    const kpis = computed(() => {
      const s = stats.value; if (!s) return [];
      const bs = s.by_status || {};
      return [
        { n: s.total || 0,        l: '工单总量',     c: '#E60012' },
        { n: s.today || 0,        l: '今日新增',     c: '#E60012' },
        { n: bs.pending || 0,     l: '待处理',       c: '#FF9500' },
        { n: (bs.processing||0) + (bs.dispatched||0), l: '处理中', c: '#5856D6' },
        { n: (bs.completed||0) + (bs.closed||0),     l: '已完成',   c: '#1F9D55' },
        { n: (s.avg_hours || 0) + 'h', l: '平均处理时长', c: '#007AFF' },
      ];
    });
    const statusColor = (k) => APP_CONFIG.STATUS_MAP[k]?.color || '#999';
    const statusLabel = (k) => APP_CONFIG.STATUS_MAP[k]?.label || k;
    const pct = (v, total) => total ? Math.round(v / total * 100) + '%' : '0%';

    // 环形图（状态分布）
    const donutSvg = (byStatus) => {
      const bs = byStatus || {};
      const total = STATUS_ORDER.reduce((s, k) => s + (bs[k] || 0), 0);
      const r = 52, C = 2 * Math.PI * r;
      if (!total) return '<svg viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="#EEF0F3" stroke-width="16"/></svg>';
      let acc = 0, segs = '';
      STATUS_ORDER.forEach(k => {
        const v = bs[k] || 0; if (!v) return;
        const len = v / total * C;
        segs += `<circle cx="60" cy="60" r="${r}" fill="none" stroke="${statusColor(k)}" stroke-width="16" stroke-dasharray="${len.toFixed(2)} ${(C - len).toFixed(2)}" stroke-dashoffset="${(-acc).toFixed(2)}" transform="rotate(-90 60 60)"/>`;
        acc += len;
      });
      const solved = (bs.completed || 0) + (bs.closed || 0);
      return `<svg viewBox="0 0 120 120">
        ${segs}
        <text x="60" y="55" text-anchor="middle" font-size="12" fill="#8A9099">解决率</text>
        <text x="60" y="75" text-anchor="middle" font-size="20" font-weight="700" fill="#1A1A1A">${Math.round(solved / total * 100)}%</text>
      </svg>`;
    };
    // 横向条形图（各服务类型）
    const barsSvg = (byService) => {
      const map = APP_CONFIG.SERVICE_TYPE_MAP;
      const entries = Object.entries(byService || {}).sort((a, b) => b[1] - a[1]);
      if (!entries.length) return '<div class="empty-chart">暂无工单数据</div>';
      const max = Math.max(...entries.map(e => e[1]), 1);
      let html = '';
      entries.forEach(([k, v]) => {
        const w = Math.round(v / max * 100);
        html += `<div style="margin-bottom:13px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
            <span style="color:#333">${map[k] || k}</span><span style="color:#8A9099">${v}</span>
          </div>
          <div style="height:8px;background:#F0F1F3;border-radius:5px;overflow:hidden">
            <div style="height:100%;width:${w}%;background:linear-gradient(90deg,#E60012,#FF6A4D);border-radius:5px"></div>
          </div>
        </div>`;
      });
      return html;
    };
    // 折线面积图（近7日趋势）
    const trendSvg = (trend) => {
      const t = (trend || []).slice(-7);
      if (!t.length) return '<div class="empty-chart">暂无趋势数据</div>';
      const w = 300, h = 120, pad = 22;
      const max = Math.max(...t.map(x => x.cnt), 1);
      const n = t.length;
      const stepX = n > 1 ? (w - pad * 2) / (n - 1) : 0;
      const pts = t.map((x, i) => {
        const x1 = pad + i * stepX;
        const y1 = h - pad - (x.cnt / max) * (h - pad * 2);
        return [x1, y1, x];
      });
      const line = pts.map(p => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
      const area = `${pad},${(h - pad).toFixed(1)} ${line} ${(w - pad).toFixed(1)},${(h - pad).toFixed(1)}`;
      let dots = '', labels = '';
      pts.forEach(p => {
        dots += `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#E60012"/>`;
        labels += `<text x="${p[0].toFixed(1)}" y="${h - 6}" text-anchor="middle" font-size="9" fill="#b5bac1">${p[2].day}</text>`;
      });
      return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="display:block">
        <polygon points="${area}" fill="rgba(230,0,18,.08)"/>
        <polyline points="${line}" fill="none" stroke="#E60012" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        ${dots}${labels}
      </svg>`;
    };

    // ── 登录 / 登出 ──
    const doLogin = async () => {
      loginLoading.value = true; loginErr.value = '';
      try {
        const sb = getSb();
        const { data, error } = await sb.rpc('admin_login', { p_pass: loginPass.value });
        if (error) throw error;
        token.value = data;
        sessionStorage.setItem('admin_token', data);
        loadStats();
        activeTab.value = 'manage';
        loadTickets(true);
      } catch (e) {
        const msg = String(e?.message || '');
        if (/account_locked/.test(msg)) loginErr.value = '账户已锁定，请稍后再试';
        else if (/invalid_credentials/.test(msg)) loginErr.value = '口令错误，请重试';
        else loginErr.value = '登录失败，请稍后重试';
      } finally { loginLoading.value = false; }
    };
    const doLogout = async () => {
      try { const sb = getSb(); await sb.rpc('admin_logout', { p_token: token.value }); } catch (e) {}
      token.value = ''; sessionStorage.removeItem('admin_token');
    };
    const goUser = () => { window.location.href = './index.html'; };

    // ── 查询全部工单（管理员，分页）──
    const loadTickets = async (reset) => {
      loading.value = true;
      try {
        const sb = getSb();
        const { data, error } = await sb.rpc('get_all_tickets', {
          p_token: token.value,
          p_phone: filters.phone || null,
          p_ticket_no: filters.ticket_no ? filters.ticket_no.toUpperCase() : null,
          p_status: filters.status || null,
          p_service: filters.service || null,
          p_limit: PAGE_SIZE,
          p_offset: reset ? 0 : offset.value,
        });
        if (error) throw error;
        const rows = (data || []).map(t => ({ ...t, _newStatus: t.status, _note: '' }));
        if (reset) { tickets.value = rows; offset.value = rows.length; }
        else { tickets.value = tickets.value.concat(rows); offset.value += rows.length; }
        hasMore.value = rows.length === PAGE_SIZE;
        queried.value = true;
        expanded.value = null;
      } catch (err) {
        vant.showToast({ message: '查询失败：' + (err.message || err), icon: 'fail' });
        if (/session_invalid|invalid_credentials/.test(String(err.message || ''))) { token.value = ''; sessionStorage.removeItem('admin_token'); }
      } finally { loading.value = false; }
    };
    const doSearch = () => loadTickets(true);
    const loadMore = () => loadTickets(false);

    const toggle = (t) => {
      if (expanded.value === t.ticket_no) { expanded.value = null; return; }
      expanded.value = t.ticket_no;
      loadDetail(t);
    };
    const loadDetail = async (t) => {
      if (detailUrls[t.ticket_no]) return;
      try {
        const sb = getSb();
        const urls = { front: '', back: '', desc: [] };
        // createSignedUrl 已返回完整绝对地址（含 token），无需再拼 SUPABASE_URL；
        // 原代码拼接后 URL 重复、签名失效，导致图片无法显示。
        if (t.id_card_front_url) { const { data } = await sb.storage.from('id-cards').createSignedUrl(t.id_card_front_url, 3600); if (data?.signedUrl) urls.front = data.signedUrl; }
        if (t.id_card_back_url)  { const { data } = await sb.storage.from('id-cards').createSignedUrl(t.id_card_back_url, 3600);  if (data?.signedUrl) urls.back = data.signedUrl; }
        const descArr = Array.isArray(t.desc_images) ? t.desc_images : [];
        for (const p of descArr) {
          if (!p) continue;
          const { data } = await sb.storage.from('id-cards').createSignedUrl(p, 3600);
          if (data?.signedUrl) urls.desc.push(data.signedUrl);
        }
        detailUrls[t.ticket_no] = urls;
      } catch (e) { console.warn('签名失败:', e); }
    };
    const preview = (url) => { window.open(url, '_blank'); };
    // 下载图片：fetch 签名 URL（connect-src 已放行 *.supabase.co）→ blob → 触发下载
    const dlImg = async (url, filename) => {
      try {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const obj = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = obj; a.download = filename || 'image.jpg';
        document.body.appendChild(a); a.click(); a.remove();
        setTimeout(() => URL.revokeObjectURL(obj), 1500);
      } catch (e) {
        console.warn('下载失败，改为新标签打开:', e);
        window.open(url, '_blank');
      }
    };

    const updateStatus = async (t) => {
      try {
        const sb = getSb();
        const { error } = await sb.rpc('admin_update_ticket', { p_token: token.value, p_ticket_no: t.ticket_no, p_status: t._newStatus, p_note: t._note || '' });
        if (error) throw error;
        t.status = t._newStatus;
        t._note = '';
        vant.showToast({ message: '状态已更新', icon: 'success' });
        loadStats();
      } catch (err) {
        vant.showToast({ message: '更新失败：' + (err.message || err), icon: 'fail' });
      }
    };

    // ── 格式化 ──
    const serviceLabel = (type) => APP_CONFIG.SERVICE_TYPE_MAP[type] || type;
    const statusInfo = (status) => APP_CONFIG.STATUS_MAP[status] || { label: status, color: '#8E8E93' };
    const formatDate = (d) => {
      if (!d) return '—';
      const dt = new Date(d);
      const p = (n) => String(n).padStart(2, '0');
      return `${dt.getFullYear()}-${p(dt.getMonth()+1)}-${p(dt.getDate())} ${p(dt.getHours())}:${p(dt.getMinutes())}`;
    };

    onMounted(() => {
      if (loggedIn.value) { activeTab.value = 'manage'; loadStats(); loadTickets(true); }
    });

    return {
      loggedIn, loginPass, loginErr, loginLoading, doLogin, doLogout, goUser,
      activeTab, switchTab,
      ADMIN_SERVICE_TYPES,
      filters, STATUS_LIST, tickets, queried, loading, expanded, detailUrls,
      hasMore, loadMore, doSearch, toggle, preview, dlImg, updateStatus,
      PACKAGE_MAP, serviceLabel, statusInfo, formatDate,
      stats, kpis, donutSvg, barsSvg, trendSvg, statusColor, statusLabel, pct, STATUS_ORDER,
    };
  },
}).use(vant).mount('#app');
</script>
</body>
</html>
